name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  core-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build core dist
        run: node build-core.mjs

      - name: Run Node portability tests
        run: |
          node tests/node/parity.test.mjs
          node tests/node/io-roundtrip.test.mjs
          node tests/node/benchmark-smoke.test.mjs
          node tests/node/generation-workers-browser-export-smoke.test.mjs
          node tests/node/generation-workers-node-smoke.test.mjs

      - name: Install Playwright
        run: npm install --no-save playwright

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke
        run: node tests/browser/run-smoke.mjs
